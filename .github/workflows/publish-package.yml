name: Publish Package Artifact

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISPATCH_TOKEN: ${{ secrets.YAIP_CLOUD_DISPATCH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Read package version
        id: package_version
        run: echo "value=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: test "v${{ steps.package_version.outputs.value }}" = "$GITHUB_REF_NAME"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify packed package artifact
        run: node scripts/check-packed-build.mjs

      - name: Pack release artifact
        run: |
          mkdir -p release-artifacts
          pnpm pack --pack-destination release-artifacts

      - name: Publish GitHub release artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tarball="$(find release-artifacts -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$tarball"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$tarball" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$tarball" --title "$GITHUB_REF_NAME" --notes ""
          fi

      - name: Skip cloud release sync when dispatch token is not configured
        if: env.DISPATCH_TOKEN == ''
        run: echo "YAIP_CLOUD_DISPATCH_TOKEN is not configured; skipping cloud release sync notification."

      - name: Notify cloud release sync
        if: env.DISPATCH_TOKEN != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.DISPATCH_TOKEN }}
          repository: tielemans-dev/yaip-cloud
          event-type: oss-package-published
          client-payload: >-
            {"oss_tag":"${{ github.ref_name }}","oss_version":"${{ steps.package_version.outputs.value }}","oss_repository":"${{ github.repository }}"}
