name: Publish Package Artifacts

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISPATCH_TOKEN: ${{ secrets.YAIP_CLOUD_DISPATCH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Read package version
        id: package_version
        run: >-
          node -e "console.log('value=' +
          JSON.parse(require('node:fs').readFileSync('apps/oss/package.json',
          'utf8')).version)" >> "$GITHUB_OUTPUT"

      - name: Read contracts package version
        id: contracts_version
        run: >-
          node -e "console.log('value=' +
          JSON.parse(require('node:fs').readFileSync('packages/contracts/package.json',
          'utf8')).version)" >> "$GITHUB_OUTPUT"

      - name: Read shared package version
        id: shared_version
        run: >-
          node -e "console.log('value=' +
          JSON.parse(require('node:fs').readFileSync('packages/shared/package.json',
          'utf8')).version)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: test "v${{ steps.package_version.outputs.value }}" = "$GITHUB_REF_NAME"

      - name: Verify contracts package version matches app version
        run: test "${{ steps.contracts_version.outputs.value }}" = "${{ steps.package_version.outputs.value }}"

      - name: Verify shared package version matches app version
        run: test "${{ steps.shared_version.outputs.value }}" = "${{ steps.package_version.outputs.value }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify packed package artifact
        run: node scripts/check-packed-build.mjs

      - name: Pack release artifacts
        run: |
          mkdir -p release-artifacts
          (cd packages/contracts && bun pm pack --destination ../../release-artifacts)
          (cd packages/shared && bun pm pack --destination ../../release-artifacts)
          (cd apps/oss && bun pm pack --destination ../../release-artifacts)

      - name: Publish GitHub release artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mapfile -t tarballs < <(find release-artifacts -maxdepth 1 -type f -name '*.tgz' -print | sort)
          test "${#tarballs[@]}" -gt 0

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${tarballs[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${tarballs[@]}" --title "$GITHUB_REF_NAME" --notes ""
          fi

      - name: Skip cloud release sync when dispatch token is not configured
        if: env.DISPATCH_TOKEN == ''
        run: echo "YAIP_CLOUD_DISPATCH_TOKEN is not configured; skipping cloud release sync notification."

      - name: Notify cloud release sync
        if: env.DISPATCH_TOKEN != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.DISPATCH_TOKEN }}
          repository: tielemans-dev/yaip-cloud
          event-type: oss-package-published
          client-payload: >-
            {"oss_tag":"${{ github.ref_name }}","oss_version":"${{ steps.package_version.outputs.value }}","oss_repository":"${{ github.repository }}"}
