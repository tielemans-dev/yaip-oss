name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yaip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yaip"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yaip?schema=public
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-example-secret-that-is-over-32-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Generate Prisma client
        run: bun --filter @yaip/oss prisma:generate

      - name: Apply migrations
        working-directory: apps/oss
        run: bunx prisma migrate deploy

      - name: Validate Prisma schema
        working-directory: apps/oss
        run: bunx prisma validate

      - name: Verify migration status
        working-directory: apps/oss
        run: bunx prisma migrate status

      - name: Run unit and router tests
        run: bun run test

      - name: Run integration smoke tests
        run: bun run test:integration

      - name: Build
        run: bun run build

      - name: Install Playwright browser
        working-directory: apps/oss
        run: bunx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: bun run test:e2e

      - name: Verify packed package artifact
        run: node scripts/check-packed-build.mjs
