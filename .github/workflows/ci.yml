name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yaip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yaip"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yaip?schema=public
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-example-secret-that-is-over-32-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate Prisma client
        run: pnpm --filter @yaip/oss exec prisma generate

      - name: Apply migrations
        run: pnpm --filter @yaip/oss exec prisma migrate deploy

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Verify migration status
        run: pnpm exec prisma migrate status

      - name: Run unit and router tests
        run: pnpm test

      - name: Run integration smoke tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Verify packed package artifact
        run: node scripts/check-packed-build.mjs
